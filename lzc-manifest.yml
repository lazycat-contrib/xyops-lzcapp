name: xyOps
package: community.lazycat.app.xyops
version: 1.0.9
min_os_version: 1.3.8
description: "A complete workflow automation and server monitoring system"
license: MIT
homepage: https://github.com/pixlcore/xyops
author: PixlCore

application:
  subdomain: xyops
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://xyops:5522/

services:
  xyops:
    # ghcr.io/pixlcore/xyops:v1.0.9
    image: registry.lazycat.cloud/czyt/pixlcore/xyops:7be72e1e7854af68
    restart: unless-stopped
    environment:
      - TZ={{.U.tz}}
      - XYOPS_xysat_local=true
    binds:
      - /lzcapp/var/data:/opt/xyops/data
      - /lzcapp/var/conf:/opt/xyops/conf
    cpu_shares: 512
    mem_limit: 512M

locales:
  en:
    name: "xyOps"
    description: "A complete workflow automation and server monitoring system"
  zh:
    name: "xyOps"
    description: "完整的工作流自动化和服务器监控系统"
