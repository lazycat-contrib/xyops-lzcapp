version: 1
project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/xyops.lpk
update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: image
    image: xyops
build:
  run_buildscript: false
images:
  - id: xyops
    target: service
    service: xyops
    source: ghcr.io/pixlcore/xyops
    channel: stable
    tag_regex: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
    delivery:
      mode: lazycat
stores:
  official:
    enabled: true
    skip_if_version_exists: true
  private:
    enabled: true
    skip_if_version_exists: true
    name: xyOps
    summary: 完整的工作流自动化和服务器监控系统
